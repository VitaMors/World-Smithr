name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "build/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Check for Godot Web export
        id: export
        shell: bash
        run: |
          if test -f build/web/index.html; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Missing build/web/index.html. Export the Godot Web preset to build/web before deploying."
          fi

      - name: Upload GitHub Pages artifact
        if: steps.export.outputs.present == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        if: steps.export.outputs.present == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

